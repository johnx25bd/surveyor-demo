/* ============================================================
   Surveyor — three-pane app styles
   Themed by `.sv-mood--paper | --dark | --carto` on the root.
   ============================================================ */
/* =========================================================================
   Ordnance Survey Design System — Colour & Type Tokens
   Sources: ordnancesurvey.co.uk osweb-styles.css + GeoDataViz Toolkit
   ========================================================================= */

/* ---- Fonts ------------------------------------------------------------- */
/* We load Source Sans 3 from Google Fonts as a stand-in for the OS web sans.
   Drop official OS web font files into /fonts/ and swap --font-sans below. */
@import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300..900;1,300..900&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root {
  /* ---- Brand colour --------------------------------------------------- */
  --os-purple:           #453c90;   /* primary brand — logo wordmark, accents */
  --os-purple-dark:      #322d6c;
  --os-purple-darker:    #1f1c46;
  --os-purple-light:     #6c63b8;
  --os-purple-tint:      #ebe9f5;

  /* Magenta from the logo roundel — used as secondary accent + chat bubble */
  --os-magenta:          #d40058;
  --os-magenta-dark:     #a8004a;

  /* Primary CTA blue — the bright royal-blue used on every solid action button */
  --os-action:           #1149f4;
  --os-action-dark:      #0c34b3;

  /* Link blue — a slightly more reserved blue for inline links */
  --os-blue:             #0046c5;   /* links / informational */
  --os-blue-dark:        #00318c;

  --os-green:            #118011;   /* success */
  --os-amber:            #ffbb00;   /* warning */
  --os-red:              #c63d54;   /* danger */

  /* ---- Neutrals ------------------------------------------------------- */
  --os-black:            #0a0a0a;
  --os-ink:              #1a1a1a;
  --os-grey-900:         #2a2a2a;
  --os-grey-700:         #4a4a4a;
  --os-grey-500:         #757575;   /* mid grey — borders + meta */
  --os-grey-300:         #d1d1d1;
  --os-grey-200:         #e5e5e5;
  --os-grey-100:         #f1f1f1;
  --os-grey-050:         #f7f7f7;   /* default page background section */
  --os-white:            #ffffff;

  /* The signature OS web background — warm cream / paper.
     Used as the default page background across ordnancesurvey.co.uk. */
  --os-paper:            #f4f0ea;
  --os-paper-dark:       #e9e2d6;

  /* ---- Semantic foreground ------------------------------------------- */
  --fg-default:          var(--os-black);
  --fg-muted:            var(--os-grey-700);
  --fg-subtle:           var(--os-grey-500);
  --fg-inverse:          var(--os-white);
  --fg-link:             var(--os-blue);
  --fg-link-hover:       var(--os-blue-dark);
  --fg-brand:            var(--os-purple);
  --fg-action:           var(--os-action);

  /* ---- Semantic background ------------------------------------------- */
  --bg-default:          var(--os-paper);  /* cream, not white */
  --bg-surface:          var(--os-white);  /* white for cards on top of paper */
  --bg-muted:            var(--os-grey-050);
  --bg-subtle:           var(--os-grey-100);
  --bg-inverse:          var(--os-black);
  --bg-brand:            var(--os-purple);
  --bg-brand-tint:       var(--os-purple-tint);
  --bg-accent:           var(--os-magenta);

  /* ---- Borders -------------------------------------------------------- */
  --border-default:      var(--os-grey-200);
  --border-strong:       var(--os-grey-300);
  --border-emphasis:     var(--os-black);
  --border-brand:        var(--os-purple);

  /* ---- Status -------------------------------------------------------- */
  --status-success:      var(--os-green);
  --status-warning:      var(--os-amber);
  --status-danger:       var(--os-red);
  --status-info:         var(--os-blue);

  /* ---- GeoDataViz qualitative palette (8 hues) ----------------------- */
  --gdv-q-1: #FF1F5B;   /* magenta-red */
  --gdv-q-2: #00CD6C;   /* green */
  --gdv-q-3: #009ADE;   /* blue */
  --gdv-q-4: #AF58BA;   /* purple */
  --gdv-q-5: #FFC61E;   /* yellow */
  --gdv-q-6: #F28522;   /* orange */
  --gdv-q-7: #A0B1BA;   /* neutral grey */
  --gdv-q-8: #A6761D;   /* brown */

  /* ---- GeoDataViz RAG ------------------------------------------------- */
  --gdv-rag-red:   #E9002D;
  --gdv-rag-amber: #FFAA00;
  --gdv-rag-green: #00B000;
  --gdv-rag-cvd-red:   #C40F5B;
  --gdv-rag-cvd-amber: #FD8D3C;
  --gdv-rag-cvd-green: #089099;

  /* ---- Type families ------------------------------------------------- */
  --font-sans: "Source Sans 3", "Source Sans Pro", -apple-system, BlinkMacSystemFont,
               "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-display: var(--font-sans);
  --font-mono: "JetBrains Mono", "Source Code Pro", ui-monospace,
               SFMono-Regular, Menlo, Consolas, monospace;
  /* Cartographic typefaces — only used when embedding actual OS maps.
     Not webfonts; system fallbacks listed. */
  --font-map-leisure: "Gill Sans", "Gill Sans MT", "Source Sans 3", sans-serif;
  --font-map-os-net: "Camphor Pro", "Camphor", "Source Sans 3", sans-serif;
  --font-map-road:   Arial, Helvetica, sans-serif;

  /* ---- Type scale ---------------------------------------------------- */
  --fs-12: 0.75rem;     /* 12 */
  --fs-14: 0.875rem;    /* 14 */
  --fs-16: 1rem;        /* 16 */
  --fs-18: 1.125rem;    /* 18 — default body */
  --fs-20: 1.25rem;
  --fs-24: 1.5rem;
  --fs-28: 1.75rem;
  --fs-32: 2rem;
  --fs-40: 2.5rem;
  --fs-48: 3rem;
  --fs-56: 3.5rem;
  --fs-64: 4rem;

  /* ---- Weights ------------------------------------------------------- */
  --fw-light:    300;
  --fw-regular:  400;
  --fw-medium:   500;
  --fw-semibold: 600;
  --fw-bold:     700;

  /* ---- Line-height --------------------------------------------------- */
  --lh-tight:   1.15;
  --lh-snug:    1.25;
  --lh-normal:  1.4;
  --lh-relaxed: 1.5;
  --lh-loose:   1.65;

  /* ---- Tracking ------------------------------------------------------ */
  --ls-tight:  -0.01em;
  --ls-normal: 0;
  --ls-wide:   0.04em;
  --ls-caps:   0.08em;

  /* ---- Spacing (8-pt grid) ------------------------------------------- */
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  24px;
  --space-6:  32px;
  --space-7:  48px;
  --space-8:  64px;
  --space-9:  96px;
  --space-10: 128px;

  /* ---- Radii --------------------------------------------------------- */
  /* OS web is VERY square — buttons and cards use 2–4px. Pills only on chips. */
  --radius-0:    0;
  --radius-xs:   2px;   /* buttons, inputs */
  --radius-sm:   4px;   /* cards (subtle) */
  --radius-md:   6px;
  --radius-lg:   8px;
  --radius-full: 9999px;  /* chips, avatar, chat FAB */

  /* ---- Elevation (used sparingly) ----------------------------------- */
  --shadow-none:    none;
  --shadow-sticky:  0 2px 8px rgba(0, 0, 0, 0.08);
  --shadow-overlay: 0 8px 24px rgba(0, 0, 0, 0.12);
  --shadow-modal:   0 16px 48px rgba(0, 0, 0, 0.20);

  /* ---- Focus --------------------------------------------------------- */
  --focus-ring: 0 0 0 3px rgba(69, 60, 144, 0.35);

  /* ---- Motion -------------------------------------------------------- */
  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
  --dur-fast:    150ms;
  --dur-base:    200ms;
  --dur-slow:    300ms;

  /* ---- Layout -------------------------------------------------------- */
  --container-max: 1280px;
  --header-height: 88px;
}

/* ---- Element defaults ------------------------------------------------- */
html { font-family: var(--font-sans); color: var(--fg-default); background: var(--bg-default); }

body {
  font-size: var(--fs-18);
  line-height: var(--lh-relaxed);
  font-weight: var(--fw-regular);
  -webkit-font-smoothing: antialiased;
}

h1, .h1 { font-size: var(--fs-56); font-weight: var(--fw-bold); line-height: var(--lh-tight); letter-spacing: var(--ls-tight); margin: 0; }
h2, .h2 { font-size: var(--fs-40); font-weight: var(--fw-bold); line-height: var(--lh-snug);  margin: 0; }
h3, .h3 { font-size: var(--fs-28); font-weight: var(--fw-semibold); line-height: var(--lh-snug); margin: 0; }
h4, .h4 { font-size: var(--fs-20); font-weight: var(--fw-semibold); line-height: var(--lh-normal); margin: 0; }
h5, .h5 { font-size: var(--fs-16); font-weight: var(--fw-semibold); line-height: var(--lh-normal); text-transform: uppercase; letter-spacing: var(--ls-caps); margin: 0; }

p { margin: 0 0 var(--space-4); }

a {
  color: var(--fg-link);
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-thickness: 1px;
  transition: color var(--dur-fast) var(--ease-standard);
}
a:hover { color: var(--fg-link-hover); text-decoration-thickness: 2px; }

code, kbd, samp, pre {
  font-family: var(--font-mono);
  font-size: 0.9375em;
  background: var(--bg-subtle);
  padding: 0.1em 0.35em;
  border-radius: var(--radius-xs);
}
pre code { background: transparent; padding: 0; }

::selection { background: var(--os-purple); color: var(--os-white); }

/* ---- Utility -- buttons (canonical OS web shape) -------------------- */
.os-btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  white-space: nowrap;
  flex-shrink: 0;
  padding: 12px 24px;
  font-family: var(--font-sans);
  font-size: var(--fs-16);
  font-weight: var(--fw-semibold);
  line-height: 1.2;
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
  cursor: pointer;
  text-decoration: none;
  transition: background var(--dur-fast) var(--ease-standard),
              border-color var(--dur-fast) var(--ease-standard),
              color var(--dur-fast) var(--ease-standard),
              transform var(--dur-fast) var(--ease-standard);
}
.os-btn--primary   { background: var(--os-action); color: var(--os-white); border-color: var(--os-action); border-radius: var(--radius-xs); }
.os-btn--primary:hover { background: var(--os-action-dark); border-color: var(--os-action-dark); }
.os-btn--primary:active { transform: translateY(1px); }

.os-btn--secondary { background: transparent; color: var(--os-action); border-color: var(--os-action); border-radius: var(--radius-xs); }
.os-btn--secondary:hover { background: rgba(17, 73, 244, 0.08); }

.os-btn--ghost     { background: transparent; color: var(--os-black); border-color: transparent; }
.os-btn--ghost:hover { background: rgba(0, 0, 0, 0.06); }

.os-btn:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(17, 73, 244, 0.35); }


/* ---- Theme variables (PAPER default) ----------------------- */
.sv-app, .sv-app *, .sv-app *::before, .sv-app *::after { box-sizing: border-box; }
.sv-app { min-width: 0; }
.sv-chat, .sv-chat-stream, .sv-msg, .sv-msg-body { min-width: 0; }

.sv-app {
  --sv-bg:           var(--os-paper);
  --sv-surface:      #ffffff;
  --sv-surface-2:    #fbf7f1;
  --sv-border:       #e8e0d0;
  --sv-border-strong:#d4cdbf;
  --sv-fg:           var(--os-ink);
  --sv-fg-muted:     #4a4a4a;
  --sv-fg-subtle:    #757575;
  --sv-brand:        var(--os-purple);
  --sv-brand-2:      var(--os-magenta);
  --sv-action:       var(--os-action);
  --sv-link:         var(--os-blue);
  --sv-hex-empty:    #ece6d8;
  --sv-skel:         #ece6d8;
  --sv-overlay:      rgba(244, 240, 234, 0.75);

  font-family: var(--font-sans);
  color: var(--sv-fg);
  background: var(--sv-bg);
  height: 100%;
  display: flex; flex-direction: column;
}

/* ---- DARK mood ---------------------------------------------- */
.sv-app.sv-mood--dark {
  --sv-bg:           #0d1117;
  --sv-surface:      #161b22;
  --sv-surface-2:    #1c232d;
  --sv-border:       #2a323d;
  --sv-border-strong:#3a4250;
  --sv-fg:           #f3f3f3;
  --sv-fg-muted:     #b8bdc6;
  --sv-fg-subtle:    #8b94a3;
  --sv-brand:        #8a7fd4;          /* lighter purple for dark */
  --sv-brand-2:      #ff5c8a;          /* lighter magenta */
  --sv-action:       #5d83ff;          /* lighter action blue */
  --sv-link:         #5d83ff;
  --sv-hex-empty:    #232a35;
  --sv-skel:         #232a35;
  --sv-overlay:      rgba(13, 17, 23, 0.78);
}

/* ---- CARTO mood (paper + map textures + heavier display) ---- */
.sv-app.sv-mood--carto {
  --sv-bg:           #efe7d5;
  --sv-surface:      #fdf9ef;
  --sv-surface-2:    #f6efde;
  --sv-border:       #d3c5a3;
  --sv-border-strong:#b8a87f;
  --sv-fg:           #1c1a14;
  --sv-fg-muted:     #5a5340;
  --sv-fg-subtle:    #7d7762;
  --sv-brand:        #4a3b1a;          /* contour-ink */
  --sv-brand-2:      var(--os-magenta);
  --sv-action:       #5b3a1a;          /* burnt-umber action */
  --sv-link:         #5b3a1a;
  --sv-hex-empty:    #e1d4af;
  --sv-skel:         #e1d4af;
  --sv-overlay:      rgba(239, 231, 213, 0.78);
}
.sv-app.sv-mood--carto {
  background:
    /* contour topo lines */
    radial-gradient(ellipse 60% 30% at 30% 30%, transparent 0 49%, rgba(74,59,26,.07) 50% 50.5%, transparent 51%),
    radial-gradient(ellipse 60% 30% at 30% 30%, transparent 0 59%, rgba(74,59,26,.05) 60% 60.5%, transparent 61%),
    radial-gradient(ellipse 80% 50% at 70% 70%, transparent 0 49%, rgba(74,59,26,.06) 50% 50.5%, transparent 51%),
    var(--sv-bg);
}

/* ============================================================
   Topbar
   ============================================================ */
.sv-topbar {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; gap: 12px;
  padding: 0 20px; height: 56px; flex-shrink: 0;
  background: var(--sv-surface); border-bottom: 1px solid var(--sv-border);
}
.sv-topbar-l { display: flex; align-items: center; gap: 14px; }
.sv-topbar-c { text-align: center; }
.sv-topbar-r { display: flex; align-items: center; gap: 10px; justify-content: flex-end; }
.sv-os { height: 22px; width: auto; }
.sv-mood--dark .sv-os { filter: brightness(0) invert(1); opacity: 0.85; }
.sv-divider { width: 1px; height: 22px; background: var(--sv-border-strong); }
.sv-brand { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; }
.sv-brand-mark { color: var(--sv-brand); display: inline-flex; }
.sv-brand-name { font-size: 16px; letter-spacing: -0.01em; }
.sv-brand-tag {
  font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  padding: 2px 6px; border-radius: 2px;
  background: var(--sv-surface-2); color: var(--sv-fg-muted);
  border: 1px solid var(--sv-border);
}
.sv-query-title { font-size: 14px; font-weight: 600; color: var(--sv-fg-muted); }
.sv-iconbtn {
  width: 32px; height: 32px; border-radius: 4px;
  background: transparent; border: 0; cursor: pointer;
  color: var(--sv-fg-muted); display: inline-flex; align-items: center; justify-content: center;
}
.sv-iconbtn:hover { background: var(--sv-surface-2); color: var(--sv-fg); }
.sv-ghostbtn {
  height: 32px; padding: 0 14px;
  font-family: inherit; font-size: 13px; font-weight: 600;
  background: transparent; border: 1px solid var(--sv-border-strong); border-radius: 4px;
  color: var(--sv-fg); cursor: pointer;
}
.sv-ghostbtn:hover { background: var(--sv-surface-2); }
.sv-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--sv-brand); color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 12px;
  flex-shrink: 0;
}
.sv-avatar--sm { width: 22px; height: 22px; font-size: 11px; }
.sv-avatar--user { background: var(--sv-fg); }

/* ============================================================
   Grid: chat | map | rail
   ============================================================ */
.sv-grid {
  display: grid;
  grid-template-columns: 380px 1fr 360px;
  flex: 1; min-height: 0;
}

/* ============================================================
   Chat pane
   ============================================================ */
.sv-chat {
  background: var(--sv-surface);
  border-right: 1px solid var(--sv-border);
  display: flex; flex-direction: column;
  min-width: 0; min-height: 0;  /* contain flex/grid children */
  overflow: hidden;
}
.sv-chat-stream {
  flex: 1; overflow: auto;
  padding: 20px 20px 12px;
  display: flex; flex-direction: column; gap: 18px;
}

/* Empty state */
.sv-empty { display: flex; flex-direction: column; gap: 24px; padding-top: 12px; }
.sv-empty-greet { display: flex; gap: 12px; align-items: flex-start; }
.sv-empty-lead { margin: 0; font-size: 18px; font-weight: 600; color: var(--sv-fg); }
.sv-empty-sub { margin: 6px 0 0; font-size: 14px; line-height: 1.5; color: var(--sv-fg-muted); }
.sv-empty-sugs { display: flex; flex-direction: column; gap: 8px; }
.sv-empty-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--sv-fg-subtle); margin-bottom: 4px; }
.sv-sug {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 12px 14px;
  background: var(--sv-surface-2); border: 1px solid var(--sv-border); border-radius: 4px;
  font-family: inherit; font-size: 13px; line-height: 1.4; text-align: left;
  color: var(--sv-fg); cursor: pointer;
  transition: border-color 150ms, background 150ms;
}
.sv-sug:hover { border-color: var(--sv-action); color: var(--sv-action); }
.sv-sug svg { color: var(--sv-fg-subtle); flex-shrink: 0; }
.sv-sug:hover svg { color: var(--sv-action); }

/* User message */
.sv-msg { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
.sv-msg > * { min-width: 0; max-width: 100%; }
.sv-msg--user { align-items: flex-end; }
.sv-msg-bubble {
  background: var(--sv-brand); color: #fff;
  padding: 10px 14px; border-radius: 12px 12px 2px 12px;
  max-width: 90%; font-size: 14px; line-height: 1.5;
}

/* Assistant message */
.sv-msg--assistant { align-items: stretch; }
.sv-msg-head { display: flex; align-items: center; gap: 8px; }
.sv-msg-meta { font-size: 13px; font-weight: 600; color: var(--sv-fg); }
.sv-thinking { font-size: 12px; color: var(--sv-fg-subtle); }
.sv-thinking::after { content: "•••"; letter-spacing: 2px; animation: sv-dots 1.4s steps(4, end) infinite; }
@keyframes sv-dots { 0%,20%{opacity:.2} 50%{opacity:.6} 100%{opacity:.2} }
.sv-msg-body { font-size: 14px; line-height: 1.55; color: var(--sv-fg); display: flex; flex-direction: column; gap: 10px; }
.sv-msg-body p { margin: 0; }
.sv-msg-caveat { font-size: 12px; color: var(--sv-fg-subtle); padding: 8px 10px; background: var(--sv-surface-2); border-left: 2px solid var(--sv-border-strong); border-radius: 0 2px 2px 0; }
.sv-msg-body strong { color: var(--sv-fg); }
.sv-msg-body em { font-family: var(--font-mono); font-size: 0.92em; font-style: normal; background: var(--sv-surface-2); padding: 1px 4px; border-radius: 2px; }

/* Streaming cursor */
.sv-streaming { padding: 2px 0; }
.sv-streaming-cursor {
  display: inline-block; width: 8px; height: 14px;
  background: var(--sv-fg); animation: sv-blink 0.9s steps(2, end) infinite;
  vertical-align: text-bottom;
}
@keyframes sv-blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

/* Tool calls — INLINE style */
.sv-tool { font-size: 12.5px; line-height: 1.4; }
.sv-tool--inline {
  border: 1px solid var(--sv-border);
  border-radius: 4px;
  background: var(--sv-surface-2);
  overflow: hidden;
}
.sv-tool--inline.sv-tool--running { border-color: var(--sv-action); }
.sv-tool-head {
  width: 100%; padding: 8px 10px;
  background: transparent; border: 0; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  font-family: inherit; text-align: left; color: var(--sv-fg);
}
.sv-tool-chevron { color: var(--sv-fg-subtle); font-size: 10px; width: 10px; flex-shrink: 0; }
.sv-tool-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gdv-q-2); flex-shrink: 0; }
.sv-tool--running .sv-tool-dot {
  background: var(--sv-action);
  box-shadow: 0 0 0 0 currentColor;
  animation: sv-pulse 1.4s ease-out infinite;
}
@keyframes sv-pulse {
  0%   { box-shadow: 0 0 0 0   rgba(17, 73, 244, .5); }
  70%  { box-shadow: 0 0 0 8px rgba(17, 73, 244, 0); }
  100% { box-shadow: 0 0 0 0   rgba(17, 73, 244, 0); }
}
.sv-tool-name { font-family: var(--font-mono); font-weight: 600; font-size: 12px; color: var(--sv-brand); flex-shrink: 0; padding: 0; background: transparent; }
.sv-mood--dark .sv-tool-name { color: var(--sv-brand); }
.sv-tool-args { font-family: var(--font-mono); font-size: 11px; color: var(--sv-fg-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
.sv-tool-status { font-size: 11px; color: var(--sv-fg-subtle); flex-shrink: 0; }
.sv-tool--running .sv-tool-status { color: var(--sv-action); }
.sv-tool-body {
  padding: 8px 10px 10px 28px;
  font-family: var(--font-mono); font-size: 11.5px; color: var(--sv-fg-muted);
  border-top: 1px solid var(--sv-border);
}
.sv-tool-skel { color: var(--sv-fg-subtle); }

/* Tool calls — DRAWER style (compact) */
.sv-tool--drawer {
  width: 100%; padding: 6px 10px;
  background: var(--sv-surface-2); border: 1px solid var(--sv-border); border-radius: 4px;
  display: flex; align-items: center; gap: 8px;
  font-family: inherit; text-align: left; color: var(--sv-fg); cursor: pointer;
}
.sv-tool--drawer .sv-tool-name { font-size: 11.5px; }
.sv-tool--drawer .sv-tool-args { font-size: 10.5px; }

/* Tool calls — TIMELINE style (rail on left) */
.sv-tool--timeline {
  position: relative;
  padding: 4px 0 4px 24px;
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 11.5px;
  min-width: 0; max-width: 100%;
  overflow: hidden;
}
.sv-tool--timeline .sv-tool-rail { position: absolute; left: 8px; top: -10px; bottom: -10px; width: 1px; background: var(--sv-border-strong); }
.sv-tool--timeline .sv-tool-dot { position: absolute; left: 4px; top: 50%; transform: translateY(-50%); }
.sv-tool--timeline .sv-tool-name { color: var(--sv-brand); font-weight: 700; flex-shrink: 0; }
.sv-tool--timeline .sv-tool-args { color: var(--sv-fg-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }

/* Composer */
.sv-composer {
  flex-shrink: 0; padding: 12px 16px 16px;
  background: var(--sv-surface);
  border-top: 1px solid var(--sv-border);
  display: flex; flex-direction: column; gap: 8px;
}
.sv-composer textarea {
  width: 100%; padding: 10px 12px; min-height: 64px; resize: none;
  font-family: inherit; font-size: 14px; line-height: 1.45;
  background: var(--sv-bg); color: var(--sv-fg);
  border: 1px solid var(--sv-border-strong); border-radius: 4px;
  outline: none;
}
.sv-composer textarea:focus { border-color: var(--sv-action); box-shadow: 0 0 0 3px rgba(17,73,244,.18); }
.sv-composer-actions { display: flex; align-items: center; justify-content: space-between; }
.sv-composer-icon {
  width: 32px; height: 32px; border-radius: 4px; background: transparent; border: 0; cursor: pointer;
  color: var(--sv-fg-muted); display: inline-flex; align-items: center; justify-content: center;
}
.sv-composer-icon:hover { background: var(--sv-surface-2); color: var(--sv-fg); }
.sv-composer-send {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; height: 34px;
  background: var(--sv-action); color: #fff;
  font-family: inherit; font-size: 13px; font-weight: 600;
  border: 0; border-radius: 4px; cursor: pointer;
}
.sv-composer-send:disabled { opacity: 0.6; cursor: not-allowed; }
.sv-composer-send:hover:not(:disabled) { background: var(--os-action-dark); }

/* ============================================================
   Map pane
   ============================================================ */
.sv-map {
  background: var(--sv-bg);
  display: flex; flex-direction: column; min-height: 0;
  position: relative;
}
.sv-map-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; gap: 16px;
  border-bottom: 1px solid var(--sv-border);
  background: var(--sv-surface);
}
.sv-map-title { display: flex; flex-direction: column; gap: 2px; }
.sv-map-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--sv-fg-subtle); }
.sv-map-h1 { font-size: 16px; font-weight: 700; color: var(--sv-fg); letter-spacing: -0.01em; }
.sv-map-controls { display: flex; gap: 4px; padding: 2px; background: var(--sv-surface-2); border-radius: 4px; }
.sv-map-canvas {
  flex: 1; position: relative; padding: 20px 32px;
  display: flex; align-items: center; justify-content: center;
  min-height: 0; min-width: 0;
}
.sv-map-svg { width: 100%; height: 100%; max-height: 100%; display: block; }
.sv-map-grain { color: var(--sv-fg); opacity: 0.5; }
.sv-mood--carto .sv-map-grain { opacity: 0.8; }

/* Hexes */
.sv-hex { cursor: pointer; }
.sv-hex-fill {
  transition: fill 200ms;
  stroke: var(--sv-bg);
  stroke-width: 2;
}
.sv-mood--dark .sv-hex-fill { stroke: var(--sv-bg); }
.sv-hex--empty .sv-hex-fill { stroke: var(--sv-bg); }
.sv-hex--thinking .sv-hex-fill { opacity: 0.4; }
.sv-hex.is-hover .sv-hex-fill { filter: brightness(1.05); }
.sv-hex-stroke {
  stroke: var(--sv-fg); stroke-width: 2;
  pointer-events: none;
}
.sv-hex.is-selected .sv-hex-stroke { stroke-width: 3; }

/* Callout */
.sv-hex-callout line { stroke: var(--sv-fg); stroke-width: 1.5; }
.sv-hex-callout rect { fill: var(--sv-surface); stroke: var(--sv-fg); stroke-width: 1.5; }
.sv-hex-callout-title { font-family: var(--font-sans); font-size: 13px; font-weight: 700; fill: var(--sv-fg); }
.sv-hex-callout-stat  { font-family: var(--font-mono); font-size: 11px; fill: var(--sv-fg-muted); }

/* Map loading overlay */
.sv-map-overlay {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: var(--sv-overlay); backdrop-filter: blur(2px);
}
.sv-map-loading {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  font-size: 13px; color: var(--sv-fg-muted);
}
.sv-spinner {
  width: 28px; height: 28px; border-radius: 50%;
  border: 3px solid var(--sv-border); border-top-color: var(--sv-action);
  animation: sv-spin 0.8s linear infinite;
}
@keyframes sv-spin { to { transform: rotate(360deg); } }

/* Map foot */
.sv-map-foot {
  padding: 12px 20px; border-top: 1px solid var(--sv-border); background: var(--sv-surface);
  display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
}
.sv-legend { display: flex; align-items: center; gap: 10px; }
.sv-legend-label { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--sv-fg-subtle); }
.sv-legend-ramp { display: flex; height: 10px; width: 180px; border-radius: 1px; overflow: hidden; }
.sv-legend-ramp span { flex: 1; }
.sv-legend-scale { display: flex; justify-content: space-between; width: 180px; font-family: var(--font-mono); font-size: 10px; color: var(--sv-fg-subtle); }
.sv-map-attribution { font-size: 10.5px; color: var(--sv-fg-subtle); }

/* ============================================================
   Right rail
   ============================================================ */
.sv-rail {
  background: var(--sv-bg);
  border-left: 1px solid var(--sv-border);
  overflow: auto; min-height: 0;
  padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.sv-rail-empty {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; padding: 32px 20px; color: var(--sv-fg-subtle); text-align: center;
}
.sv-rail-empty-icon { color: var(--sv-fg-subtle); opacity: 0.6; }
.sv-rail-empty p { font-size: 13px; line-height: 1.5; margin: 0; max-width: 220px; }

.sv-card {
  background: var(--sv-surface); border: 1px solid var(--sv-border); border-radius: 4px;
  padding: 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.sv-card-eyebrow { font-size: 10.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--sv-fg-subtle); }
.sv-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.sv-card-head h3 { font-size: 15px; font-weight: 700; line-height: 1.3; margin: 2px 0 0; color: var(--sv-fg); }
.sv-card-foot { font-size: 11px; color: var(--sv-fg-subtle); margin-top: 4px; line-height: 1.4; }
.sv-chip {
  display: inline-flex; align-items: center; padding: 2px 8px;
  font-size: 11px; font-weight: 600; color: var(--sv-fg-muted);
  background: var(--sv-surface-2); border: 1px solid var(--sv-border); border-radius: 9999px;
  flex-shrink: 0;
}

/* Stat card */
.sv-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.sv-stat-n { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; color: var(--sv-fg); }
.sv-stat-l { font-size: 11.5px; color: var(--sv-fg-muted); margin-top: 4px; line-height: 1.35; }

/* Ranked chart */
.sv-ranked { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 4px; }
.sv-ranked-row {
  display: grid; grid-template-columns: 16px 1fr 90px 28px;
  gap: 8px; align-items: center;
  padding: 4px 6px; border-radius: 2px;
  cursor: pointer;
}
.sv-ranked-row:hover, .sv-ranked-row.is-hover { background: var(--sv-surface-2); }
.sv-ranked-row.is-selected { background: var(--sv-surface-2); outline: 1px solid var(--sv-fg); outline-offset: -1px; }

// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).

  const [values, setValues] = React.useState(defaults);

  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
